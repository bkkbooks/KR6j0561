body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯爾時囉嚩拏觀於世間一切小兒從其初生至十二歲並在幼稚癡騃之位神氣未足鬼魅得便有十二曜母鬼遊行世間於晝夜分常伺其便或因眠睡或獨行坐於此之際現作種種差異之相驚怖小兒令其失常吸取精氣因成疾病遂至殤夭我見是事深所哀愍我今為說十二曜母鬼執魅小兒年月時分所患疾狀及說大明救療之法乃至作法出生祭祀儀則若復有人聞我所說有疾患者時持明人依於我法而作救療發至誠者定獲輕𭙬安樂吉祥十二曜母鬼名者所謂摩怛哩難那一蘇難那二哩嚩帝三目佉曼尼迦四尾拏隸五設俱儞六布多曩七輸瑟迦八阿哩也迦九染婆迦十必隸氷砌迦十一塞健馱十二如是等十二曜母鬼執魅小兒為求祭祀我今各各說其執魅相狀若復小兒於初生日初生月初生年被執魅者是摩怛哩難那母鬼所執其小兒先患寒熱身體瘦弱漸漸乾枯心神荒亂身常顫掉啼哭不食者持明人於二河岸取土作患小兒像於四方曼拏羅內面西安小兒像復於曼拏羅設種種香華及白色飲食乃至酒肉等復設七座幢燃七盞燈復用白芥子野狐糞猫兒糞安悉香蛇皮以如是等藥用黃牛酥同和為香燒薰小兒復用𦱔麻油麻荊子或用葉及蓽茇羅樹葉嚩囉迦藥如是五藥以水煎之沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物誦大明曰唵引曩謨囉引嚩拏引野一怛賴二合路枳也二合尾捺囉二合引鉢拏引野二賀曩嚩日哩二合引拏三沒囉二合憾摩二合難儞曩四摩引哩迦二合嚕閉拏五摩引怛哩二合難那引六嚩囉嚩囉七輸瑟迦二合輸瑟迦二合八捫左捫左九俱摩引囉岡娑嚩二合引賀引十如是誦大明加持已出於城外以日中時面東祭摩怛哩難那母鬼所有祭食香華等物隨處棄擲所患小兒速得除瘥復次小兒於初生後第二日第二月第二年得患者是蘇難那母鬼所執其小兒先患寒熱作荒亂相合眼不食手足畜搦腹內疼痛吐逆喘息者持明人當用米粉一斗作病小兒像面西安曼拏羅中復於曼拏羅設種種上妙香華飲食及酒肉等復用白色幢四座燃燈四盞復用安悉香蒜蛇皮白芥子猫兒糞酥同和為香燒薰小兒又同前用五藥水沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物即說大明曰唵引曩謨囉引嚩拏引野一怛賴二合路枳也二合尾捺囉二合引波拏引野二贊捺囉二合賀引娑馱哩尼三入嚩二合㘑多賀娑多二合引野四賀曩賀曩五那賀那賀六怛哩二合輸隸曩努瑟吒二合屹囉二合賀引七儞訖哩二合多野儞訖哩多野八祖沙野祖沙野九賀曩賀曩十蘇難那捫左捫左十一俱摩引囉岡娑嚩二合引賀引十二如是誦大明加持已出於城外以戌時面西祭蘇難那母鬼所有祭食香華等物隨處棄之所患小兒速得除瘥復次小兒於初生後第三日第三月第三年得患者是哩嚩帝母鬼所執其小兒忽然驚悸叫呼啼哭身體疼痛寒熱無恆頭面顫動顧視自身漸漸羸弱不思飲食以至枯瘦者持明人當用種種上味肉食及生肉生魚酒等設紅色憧八座燃燈八盞復用尾螺樹葉安息香蛇皮蒜猫兒糞白芥子等用酥同和燒薰小兒及同前五藥煎以水沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物即說大明曰唵引曩謨囉引嚩拏引野一捺舍嚩那曩二贊捺囉二合賀引娑引野三鉢囉二合入嚩二合㘑多賀娑多二合引野四賀曩賀曩五那賀那賀六摩哩那二合野摩哩那二合野七努瑟吒二合屹囉二合㰠八謨吒野謨吒野娑嚩二合引賀引九如是誦大明加持已出於城外以戌時面向北祭哩嚩帝母鬼所有祭食種種物等隨處棄之所患小兒速得除瘥復次小兒於初生後第四日第四月第四年得患者是目佉曼尼迦母鬼所執其小兒先患寒熱咳嗽吐逆身顫垂頭啼哭手搔兩目顧視人面不思飲食饒大小便者持明人當於河兩岸取土作病小兒像面西安曼拏羅內復設種種香華及生熟肉食并酒果等又用紅色幢四座燃四盞燈復用兜羅子蛇皮猫兒糞牛角虎爪白芥子等同和為香燒薰小兒復用同前五藥水沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物即說大明曰唵引曩謨一沒囉二合憾摩二合引尾鉢努二合摩呬濕嚩二合囉二塞剛二合那虎多引設曩三目佉曼尼迦引四賀曩賀曩五摩哩那二合野摩哩那二合野六儞訖哩二合多野七儞訖哩二合多野八佉引呬佉引呬九婆誐嚩帝十目佉曼尼迦引娑嚩二合引賀引十一如是誦大明加持已出於城外用戌時面向南祭目佉曼尼迦母鬼所有祭食種種物等隨處棄之所患小兒速得除瘥復次小兒初生後第五日第五月第五年得患者是尾拏㘑迦母鬼所執其小兒先患心神恍惚多發瞋怒寒熱不恆咳嗽吐逆身忽生瘡如水泡相眼視虛空不思飲食漸漸羸瘦腹陷不現者持明之人當造白色飲食及酒肉等設白色幢五座燃燈五盞并種種香華等復用安息香蒜蛇皮猫兒糞白芥子等用酥同和為香燒熏小兒復用同前五藥水沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物即說大明曰唵引曩謨囉引嚩拏引野一怛賴二合路迦也二合尾捺囉二合引波拏引野二尾拏引㘑迦引尾拏引㘑迦引謨乞叉二合野三謨乞叉二合野四賀曩賀曩五贊捺囉二合賀引細曩六捫左捫左七尾拏引㘑迦引娑嚩二合引賀引八如是誦大明加持已出城外於日中時面西祭尾拏㘑迦母鬼所有祭食種種等物隨處棄之所患小兒速得除瘥復次小兒初生後第六日第六月第六年得患者是設俱儞母鬼所執其小兒先患寒熱或笑或啼身體顫動而有穢氣不思飲食漸漸羸瘦者持明人用米粉一斗作病小兒像面西安曼拏羅中復設種種香華飲食酒肉及乳粥等復設白色幢四座燃燈四盞復用安息香蒜蛇皮猫兒糞白芥子酥同和為香燒熏小兒復用同前五藥水沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物即說大明曰唵引曩謨婆誐嚩帝一囉引嚩拏引野二朗俱濕嚩二合囉引野三必哩二合多尾捺囉二合鉢拏野四嚩日哩二合拏賀曩賀曩五設俱儞捫左捫左六俱摩引囉岡娑嚩二合引賀引七如是誦大明加持已出於城外於戌時面向南祭設俱儞母鬼所有祭食種種物等隨處棄之所患小兒速得除瘥復次小兒初生後第七日第七月第七年得患者是布多那母鬼所執其小兒先患寒熱身體疼痛多大小便常拳二手不思飲食漸漸羸瘦者持明人用吉祥草作病小兒像面西安曼拏羅中復用種種紅色華及造紅色飲食酒肉等復設白色幢八座燃燈八盞復用安息香蛇皮尸髮虎爪𩕳摩樹葉猫兒糞白芥子酥同和為香燒熏小兒復同前用五藥水沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物即說大明曰唵引曩謨婆誐嚩帝一囉引嚩拏引野二朗俱濕嚩二合囉引野三必哩二合多尾捺囉二合引鉢拏引野四俱摩引囉屹囉二合賀五儞訖哩二合覩六賀曩賀曩七祖蘭拏二合祖蘭拏二合娑嚩二合引賀引八如是誦大明加持已出於城外以戌時面向西方祭布多那母鬼所有祭食種種物等隨處棄之所患小兒速得除瘥復次小兒初生後第八日第八月第八年得患者是輸瑟迦母鬼所執其小兒先患寒熱作荒亂相身體疼痛眼不見物垂頭無力身出穢氣不思飲食者時持明人用米粉一斗作黑羖羊一頭以頭向西安曼拏羅內復用香華乳粥上味飲食及酒肉等復設白色幢五座燃燈五盞復用安息香娑惹囉娑蛇皮蒜白芥子猫兒糞酥等同和為香燒熏小兒復用同前五藥水沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物即說大明曰唵引曩謨囉引嚩拏引野一怛賴二合路迦也二合尾捺囉二合引鉢拏引野二入嚩二合羅入嚩二合羅三鉢囉二合入囉二合羅鉢囉二合入嚩二合羅四賀曩賀曩五吽癹吒半音娑嚩二合引賀引六如是誦大明加持已出於城外於戌時面向南方祭輸瑟迦母鬼所有祭食種種物等隨處棄之所患小兒速得除瘥復次小兒初生後第九日第九月第九年得患者是阿哩也迦母鬼所執其小兒先患寒熱身顫啼哭遍身疼痛口吐涎沫吐逆不止或垂頭頸或目返視不思飲食者持明人用米粉一斗作白色羖羊一頭用白色香塗羊以頭向西安曼拏羅內復設種種香華上味飲食酒肉等復設白色幢四座燃燈四盞復用蛇皮為香燒熏小兒復用同前五藥水沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物即說大明曰唵引曩謨朗迦引地鉢多曳一朗罽濕嚩二合囉引野二賀曩賀曩三鉢左鉢左四吽吽五癹吒半音娑嚩二合引賀引六如是誦大明加持已出於城外以戌時面向北方祭阿哩也迦母鬼所有祭食種種物等隨處棄之所患小兒速得除瘥復次小兒初生後第十日第十月第十年得患者是染婆迦母鬼所執其小兒先患寒熱忽作惡聲吐逆不止多大小便饒患眼目及患牙齒不思飲食者時持明人取河兩岸土作小兒像用牛黃塗像面西安曼拏羅中復設種種香華及上味飲食酒肉等復用安息香雞翅牛角蛇皮人骨猫兒糞白芥子酥同和為香燒熏小兒復用同前五藥水沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物即說大明曰唵引曩謨婆誐嚩帝一嚩酥儞嚩引野二囉摩拏毗摩嚕播野三賀曩賀曩四牛癹吒半音娑嚩二合引賀引五如是誦大明加持已出於城外以戌時面向南方祭染婆迦母鬼所有祭食種種物等隨處棄之所患小兒速得除瘥復次小兒初生後第十一日第十一月第十一年得患者是氷砌迦母鬼所執其小兒先患寒熱身體顫動指節疼痛啼哭吐逆不思飲食仰視虛空漸漸羸瘦者時持明人當用黑豆粉一斗作患小兒像用赤檀香塗已面西安曼拏羅內復以種種香華飲食及酒肉等布作二十五分設二十五幢燒二十五燈復用鴿糞鴿鴒翅人髮羖羊角猫兒糞白芥子以酥同和為香燒熏小兒復用同前五藥水沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物即說大明曰唵引曩謨婆誐嚩帝一囉嚩拏引野二贊捺囉二合賀引娑三嚩也二合屹囉二合賀娑多二合野四入嚩一合羅入嚩二合羅五鉢囉二合入嚩二合羅鉢囉二合入嚩二合羅六賀曩賀曩七努瑟吒二合屹哩二合賀娑嚩二合引賀引八如是誦大明加持已出於城外以戌時面向西方祭氷砌迦母鬼所有祭食種種物等隨處棄之所患小兒速得除瘥復次小兒初生後第十二日第十二月第十二年得患者是塞健馱母鬼所執其小兒先患寒熱瞋目視人又如期剋人相畜搦手足及畜腹肚漸漸羸瘦不思飲食者持明人用大麥麵作小兒像面西安曼拏羅內復以種種香華及上味飲食酒肉等并設紅色幢八座燃燈四盞復用牛角白芥子安息香蒜蛇皮猫兒糞酥等同和為香燒熏小兒復用同前五藥水沐浴小兒即誦大明加持如上曼拏羅中祭食及種種物即說大明曰唵引曩謨囉引嚩拏引野一怛哩二合布囉二尾曩引舍曩引野三能瑟吒囉三合引怛迦二合囉羅四婆引酥囉引野五贊捺囉二合賀細曩六賀曩賀曩七摩哩那二合摩哩那二合八難尼曩九尾捺囉二合引鉢野十尾捺囉二合鉢野十一塞健二合馱十二捫左捫左十三俱摩囉岡十四吽吽十五癹吒半音癹吒半音娑嚩二合引賀引十六如是誦大明加持已出於城外以戌時從於東方旋轉四方祭塞健馱母鬼所有祭食及種種物等隨處棄之所患小兒速得除瘥爾時羅嚩拏說是救療小兒疾病經已歡喜而退
